<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apartamento à Venda/title>
  
  <!-- Fonte e Ícones -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <span class="tag">Venda Direta com Proprietário</span>
      <h1>Apartamento à Venda</h1>
      <div class="price">R$ 445.000</div>
      <p class="price-subtitle">(Valor para negociação direta comigo. Valor promocional por tempo limitado enquanto tenho uma isenção em vigor)</p>
      
      <div class="header-actions">
        <a href="https://wa.me/5541999862142?text=Olá,%20Estíverson!%20Vi%20o%20anúncio%20do%20seu%20imóvel%20e%20gostaria%20de%20mais%20informações." class="btn btn-wsp" target="_blank">
          <i class="fa-brands fa-whatsapp"></i> Falar pelo WhatsApp
        </a>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Galeria de Fotos -->
    <section class="gallery">
      <h2>Fotos do Imóvel</h2>
      <div class="gallery-grid">
        <img src="img/503-1.jpeg" alt="Foto do imóvel 1" loading="lazy">
        <img src="img/503-2.jpeg" alt="Foto do imóvel 2" loading="lazy">
        <img src="img/503-3.jpeg" alt="Foto do imóvel 3" loading="lazy">
        <img src="img/503-4.jpeg" alt="Foto do imóvel 4" loading="lazy">
        <img src="img/503-5.jpeg" alt="Foto do imóvel 5" loading="lazy">
        <img src="img/503-6.jpeg" alt="Foto do imóvel 6" loading="lazy">
      </div>
    </section>

    <!-- Descrição Simples em Lista -->
    <section class="details">
      <h2>O que o imóvel possui:</h2>
      <ul class="property-list">
        <li>Cozinha com todos os móveis planejados (incluindo o balcão instalado)</li>
        <li>Cozinha sob medida, com forno elétrico, cooktop e depurador</li>
        <li>Área de serviço com móveis sob medida, aquecedor de passagem e armários</li>
        <li>Sala de jantar com mesa fixa</li>
        <li>Sala de estar com painel fixo e sob medida</li>
        <li>Sacada fechada em vidro</li>
        <li>Corredor com armário até o teto</li>
        <li>Banheiro social com armário fixo</li>
        <li>Dormitório 1 - Com roupeiro fixo e sob medida</li>
        <li>Dormitório 2 - Com roupeiro fixo sob medida</li>
        <li>Dormitório suíte - Com roupeiro fixo sob medida</li>
        <li>Banheiro da suíte com armário fixo</li>
        <li>Todas as cortinas sob medida e iluminação em todos os ambientes</li>
      </ul>
    </section>

    <!-- Contato -->
    <section class="contact-box">
      <h2>Entre em Contato</h2>
      <p class="owner-name">Estíverson Oliveira</p>
      
      <div class="contact-links">
        <a href="https://wa.me/5541999862142?text=Olá,%20Estíverson!%20Gostaria%20de%20agendar%20uma%20visita." target="_blank" class="contact-item">
          <i class="fa-brands fa-whatsapp"></i> (41) 99986-2142
        </a>
        <a href="mailto:estiverson.o@gmail.com" class="contact-item">
          <i class="fa-solid fa-envelope"></i> estiverson.o@gmail.com
        </a>
      </div>
    </section>

  </main>

  <footer>
    <div class="container">
      <p>Anúncio particular • Estíverson Oliveira</p>
    </div>
  </footer>

</body>
</html>
